name: Build Release UF2

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build FZ1_display.uf2
    runs-on: ubuntu-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential git python3

      - name: Check out Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init --depth 1

      - name: Configure
        run: cmake -S . -B build -DPICO_SDK_PATH="$PWD/pico-sdk" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FZ1_display.uf2
          path: build/FZ1_display.uf2

      - name: Attach UF2 to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/FZ1_display.uf2 \
            --title "$GITHUB_REF_NAME" \
            --notes "Prebuilt UF2 firmware for the Casio FZ-1 OLED Display Replacement." \
            --verify-tag
